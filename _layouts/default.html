<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="{{ '/' | relative_url }}">
      <span class="nav-logo-accent">Dev</span>Min
    </a>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>프로필</a>
      <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>테크노트</a>
      <a href="{{ '/' | relative_url }}#projects">프로젝트</a>
      <a href="mailto:{{ site.author.email }}">연락처</a>
    </div>
    <button class="nav-menu-btn" onclick="toggleMenu()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="{{ '/' | relative_url }}" onclick="toggleMenu()">프로필</a>
    <a href="{{ '/blog/' | relative_url }}" onclick="toggleMenu()">테크노트</a>
    <a href="{{ '/' | relative_url }}#projects" onclick="toggleMenu()">프로젝트</a>
    <a href="mailto:{{ site.author.email }}" onclick="toggleMenu()">연락처</a>
  </div>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo"><span class="accent">Dev</span>Min</span>
      <span class="footer-copy">© 2026 권강민. Powered by GitHub Pages.</span>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
